<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel deck mascot: rounded head + dangling orchestrations (matches MascotSprite canvas) -->
  <g fill="#e8942a">
    <!-- Head -->
    <rect x="5" y="2" width="6" height="1"/>
    <rect x="4" y="3" width="8" height="1"/>
    <rect x="3" y="4" width="10" height="3"/>
    <rect x="4" y="7" width="8" height="1"/>
    <!-- Orchestrations -->
    <rect x="3" y="8" width="2" height="3"/>
    <rect x="5" y="8" width="2" height="4"/>
    <rect x="7" y="8" width="2" height="5"/>
    <rect x="9" y="8" width="2" height="4"/>
    <rect x="11" y="8" width="2" height="3"/>
  </g>
  <g fill="#0a0a0a">
    <!-- Head outline -->
    <rect x="5" y="1" width="6" height="1"/>
    <rect x="4" y="2" width="1" height="1"/><rect x="11" y="2" width="1" height="1"/>
    <rect x="3" y="3" width="1" height="1"/><rect x="12" y="3" width="1" height="1"/>
    <rect x="2" y="4" width="1" height="3"/><rect x="13" y="4" width="1" height="3"/>
    <rect x="3" y="7" width="1" height="1"/><rect x="12" y="7" width="1" height="1"/>
    <rect x="4" y="8" width="1" height="1"/><rect x="11" y="8" width="1" height="1"/>
    <!-- Eyes -->
    <rect x="5" y="5" width="2" height="2"/><rect x="9" y="5" width="2" height="2"/>
    <!-- Orchestration sides -->
    <rect x="2" y="8" width="1" height="3"/>
    <rect x="13" y="8" width="1" height="3"/>
    <rect x="4" y="11" width="1" height="1"/><rect x="6" y="12" width="1" height="1"/>
    <rect x="8" y="13" width="2" height="1"/>
    <rect x="9" y="12" width="1" height="1"/><rect x="11" y="11" width="1" height="1"/>
  </g>
  <!-- Cheek highlight -->
  <rect x="4" y="6" width="1" height="1" fill="#fff4cc"/>
</svg>
